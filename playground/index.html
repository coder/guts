<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golang to TypeScript Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #1e1e1e;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 120px);
        }
        .editor-container {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }
        .divider {
            width: 5px;
            background-color: #ccc;
            cursor: col-resize;
        }
        .editor-label {
            position: absolute;
            top: 5px;
            left: 10px;
            background-color: rgba(30, 30, 30, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10;
        }
        .button-container {
            padding: 10px;
            text-align: center;
            background-color: #f5f5f5;
        }
        button {
            padding: 8px 16px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #106ebe;
        }
    </style>
</head>
<body>
    <header>
        <h1>Golang to TypeScript Converter</h1>
    </header>
    
    <div class="button-container">
        <button id="convertBtn">Convert</button>
    </div>
    
    <div class="main-container">
        <div class="editor-container">
            <div class="editor-label">Go</div>
            <div id="goEditor" style="width: 100%; height: 100%;"></div>
        </div>
        <div class="divider" id="divider"></div>
        <div class="editor-container">
            <div class="editor-label">TypeScript</div>
            <div id="tsEditor" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            // Create Go editor
            const goEditor = monaco.editor.create(document.getElementById('goEditor'), {
                value: '// Enter your Go code here\npackage main\n\ntype User struct {\n\tID   int\n\tName string\n}',
                language: 'go',
                theme: 'vs-dark',
                automaticLayout: true
            });

            // Create TypeScript editor (read-only)
            const tsEditor = monaco.editor.create(document.getElementById('tsEditor'), {
                value: '// TypeScript output will appear here',
                language: 'typescript',
                theme: 'vs-dark',
                readOnly: true,
                automaticLayout: true
            });

            // Handle conversion
            document.getElementById('convertBtn').addEventListener('click', function() {
                const goCode = goEditor.getValue();
                
                // In a real implementation, this would call your conversion API
                // For now, just display a placeholder response
                tsEditor.setValue('// TypeScript conversion would appear here\n\nexport interface User {\n  id: number;\n  name: string;\n}');
            });

            // Implement resizable divider
            const divider = document.getElementById('divider');
            let isResizing = false;

            divider.addEventListener('mousedown', function(e) {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                
                const container = document.querySelector('.main-container');
                const containerRect = container.getBoundingClientRect();
                const percentage = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                
                if (percentage > 10 && percentage < 90) {
                    document.querySelector('.editor-container:first-child').style.width = percentage + '%';
                    document.querySelector('.editor-container:last-child').style.width = (100 - percentage) + '%';
                    goEditor.layout();
                    tsEditor.layout();
                }
            });

            document.addEventListener('mouseup', function() {
                isResizing = false;
                document.body.style.cursor = '';
            });
        });
    </script>
</body>
</html>
